<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EBENEZER - Connexion</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">

    <div class="login-container">
        <div class="login-header">
            <i class="fa-solid fa-print"></i>
            <h2>Imprimerie EBENEZER</h2>
            <p>Gestion Informatisée des Planifications</p>
        </div>

        <form id="form-login">
            <div class="form-group">
                <label><i class="fa-solid fa-envelope"></i> Adresse Email</label>
                <input type="email" id="email" placeholder="Ex: admin@ebenezer.com" required>
            </div>
            
            <div class="form-group">
                <label><i class="fa-solid fa-lock"></i> Mot de passe</label>
                <input type="password" id="mdp" placeholder="••••••••" required>
            </div>

            <div id="erreur-connexion" class="erreur-msg" style="display: none;">
                <i class="fa-solid fa-triangle-exclamation"></i> Email ou mot de passe incorrect.
            </div>

            <button type="submit" class="btn-login">
                <i class="fa-solid fa-right-to-bracket"></i> Se connecter
            </button>
        </form>
    </div>

    <script src="js/donnees.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
