<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EBENEZER - Gestion Clients</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-wrapper" style="display: flex; min-height: 100vh;">
        <aside class="sidebar" style="width: 260px; background: #0f172a; color: white; padding: 20px; display: flex; flex-direction: column; justify-content: space-between;">
            <div>
                <div class="logo" style="font-size: 20px; font-weight: 700; margin-bottom: 30px; display: flex; align-items: center; gap: 10px;">
                    <i class="fa-solid fa-print" style="color: #2563eb;"></i>
                    <span>EBENEZER</span>
                </div>
                <nav style="display: flex; flex-direction: column; gap: 10px;">
                    <a href="dashboard.html" class="nav-item" style="color: #94a3b8; text-decoration: none; padding: 12px; display: block;"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
                    <a href="clients.html" class="nav-item active" style="color: white; text-decoration: none; padding: 12px; border-radius: 8px; background: #1e293b; display: block;"><i class="fa-solid fa-users"></i> Gestion Clients</a>
                    <a href="commandes.html" id="menu-commandes" style="color: #94a3b8; text-decoration: none; padding: 12px; display: block;"><i class="fa-solid fa-file-invoice"></i> Commandes</a>
                    <a href="utilisateurs.html" id="menu-users" style="color: #94a3b8; text-decoration: none; padding: 12px; display: block;"><i class="fa-solid fa-user-gear"></i> Utilisateurs</a>
                </nav>
            </div>
            <div>
                <button onclick="deconnexion()" style="width: 100%; padding: 8px; background: #dc2626; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 600;">
                    <i class="fa-solid fa-power-off"></i> Déconnexion
                </button>
            </div>
        </aside>

        <main style="flex: 1; padding: 40px; background: #f8fafc;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
                <div>
                    <h1 style="font-size: 28px; color: #0f172a;">Gestion des Clients</h1>
                    <p style="color: #64748b;">Enregistrer et gérer les partenaires de l'imprimerie</p>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 2fr; gap: 30px;">
                <div style="background: white; padding: 24px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); height: fit-content;">
                    <h3 id="form-title" style="margin-bottom: 20px; color: #0f172a;">Ajouter un Client</h3>
                    <form id="form-client">
                        <input type="hidden" id="client-id">
                        <div class="form-group">
                            <label>Nom de l'Entreprise / Client</label>
                            <input type="text" id="client-nom" placeholder="Ex: Université de Kamina" required>
                        </div>
                        <div class="form-group">
                            <label>Nom du Contact principal</label>
                            <input type="text" id="client-contact" placeholder="Ex: M. Jean-Paul" required>
                        </div>
                        <div class="form-group">
                            <label>Téléphone</label>
                            <input type="text" id="client-tel" placeholder="Ex: +243 812..." required>
                        </div>
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" id="client-email" placeholder="Ex: client@mail.com" required>
                        </div>
                        <button type="submit" id="btn-submit-client" class="btn-login" style="margin-top: 10px;">
                            <i class="fa-solid fa-floppy-disk"></i> Enregistrer le client
                        </button>
                        <button type="button" id="btn-annuler" onclick="reinitialiserFormulaire()" style="width: 100%; margin-top: 10px; padding: 10px; background: #cbd5e1; color: #334155; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; display: none;">
                            Annuler la modification
                        </button>
                    </form>
                </div>

                <div style="background: white; padding: 24px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);">
                    <h3 style="margin-bottom: 20px; color: #0f172a;">Liste des clients enregistrés</h3>
                    <table style="width: 100%; border-collapse: collapse; text-align: left;">
                        <thead>
                            <tr style="border-bottom: 2px solid #f1f5f9; color: #64748b; font-size: 13px;">
                                <th style="padding: 12px;">ENTREPRISE</th>
                                <th style="padding: 12px;">CONTACT</th>
                                <th style="padding: 12px;">TÉLÉPHONE / EMAIL</th>
                                <th style="padding: 12px; text-align: right;">ACTIONS</th>
                            </tr>
                        </thead>
                        <tbody id="table-body-clients">
                            </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="js/donnees.js"></script>
    <script src="js/auth.js"></script>
    <script>
        // Sécurité & Droits d'accès
        const user = verifierSecuritePage();
        if (user.role === "Opérateur") {
            // Un opérateur n'a rien à faire ici ! Redirection forcée
            window.location.href = "dashboard.html";
        }
        if (user.role === "Planificateur") {
            document.getElementById("menu-users").style.display = "none";
        }

        const form = document.getElementById("form-client");
        const tbody = document.getElementById("table-body-clients");

        // Fonction pour afficher la liste des clients
        function afficherClients() {
            const clients = DB.get("clients");
            tbody.innerHTML = "";

            if (clients.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; padding:20px; color:#64748b;">Aucun client dans la base de données.</td></tr>`;
                return;
            }

            clients.forEach(c => {
                const tr = document.createElement("tr");
                tr.style.borderBottom = "1px solid #f1f5f9";
                tr.innerHTML = `
                    <td style="padding: 12px; font-weight: 600; color: #0f172a;">${c.nom}</td>
                    <td style="padding: 12px; color: #334155;">${c.contact}</td>
                    <td style="padding: 12px; font-size: 13px; color: #64748b;">
                        <div><i class="fa-solid fa-phone" style="font-size:11px;"></i> ${c.tel}</div>
                        <div><i class="fa-solid fa-envelope" style="font-size:11px;"></i> ${c.email}</div>
                    </td>
                    <td style="padding: 12px; text-align: right;">
                        <button onclick="chargerClientPourModification('${c.id}')" style="background:none; border:none; color:#2563eb; cursor:pointer; font-size:14px; margin-right:10px;" title="Modifier">
                            <i class="fa-solid fa-pen"></i>
                        </button>
                        <button onclick="supprimerClient('${c.id}')" style="background:none; border:none; color:#dc2626; cursor:pointer; font-size:14px;" title="Supprimer">
                            <i class="fa-solid fa-trash"></i>
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        // Ajouter ou Modifier un client au submit
        form.addEventListener("submit", (e) => {
            e.preventDefault();

            const id = document.getElementById("client-id").value;
            const nom = document.getElementById("client-nom").value.trim();
            const contact = document.getElementById("client-contact").value.trim();
            const tel = document.getElementById("client-tel").value.trim();
            const email = document.getElementById("client-email").value.trim();

            let clients = DB.get("clients");

            if (id) {
                // Mode MODIFICATION (Update)
                clients = clients.map(c => c.id === id ? { id, nom, contact, tel, email } : c);
                alert("Client mis à jour avec succès !");
            } else {
                // Mode AJOUT (Create)
                const nouveauClient = {
                    id: "c_" + Date.now(), // Génération d'un ID local unique
                    nom, contact, tel, email
                };
                clients.push(nouveauClient);
                alert("Client enregistré avec succès !");
            }

            DB.save("clients", clients);
            reinitialiserFormulaire();
            afficherClients();
        });

        // Charger les données d'un client dans le formulaire pour modification
        window.chargerClientPourModification = function(id) {
            const client = DB.trouverParId("clients", id);
            if (client) {
                document.getElementById("client-id").value = client.id;
                document.getElementById("client-nom").value = client.nom;
                document.getElementById("client-contact").value = client.contact;
                document.getElementById("client-tel").value = client.tel;
                document.getElementById("client-email").value = client.email;

                document.getElementById("form-title").innerText = "Modifier le Client";
                document.getElementById("btn-submit-client").innerHTML = `<i class="fa-solid fa-pen-to-square"></i> Mettre à jour`;
                document.getElementById("btn-annuler").style.display = "block";
            }
        };

        // Supprimer un client (Delete)
        window.supprimerClient = function(id) {
            if (confirm("Êtes-vous sûr de vouloir supprimer ce client ? Cela n'effacera pas ses commandes passées.")) {
                let clients = DB.get("clients");
                clients = clients.filter(c => c.id !== id);
                DB.save("clients", clients);
                afficherClients();
            }
        };

        // Revenir à l'état initial
        function reinitialiserFormulaire() {
            form.reset();
            document.getElementById("client-id").value = "";
            document.getElementById("form-title").innerText = "Ajouter un Client";
            document.getElementById("btn-submit-client").innerHTML = `<i class="fa-solid fa-floppy-disk"></i> Enregistrer le client`;
            document.getElementById("btn-annuler").style.display = "none";
        }

        // Lancement initial au chargement de l'écran
        afficherClients();
    </script>
</body>
</html>
