<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EBENEZER - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-wrapper" style="display: flex; min-height: 100vh;">
        <aside class="sidebar" style="width: 260px; background: #0f172a; color: white; padding: 20px; display: flex; flex-direction: column; justify-content: space-between;">
            <div>
                <div class="logo" style="font-size: 20px; font-weight: 700; margin-bottom: 30px; display: flex; align-items: center; gap: 10px;">
                    <i class="fa-solid fa-print" style="color: #2563eb;"></i>
                    <span>EBENEZER</span>
                </div>
                <nav style="display: flex; flex-direction: column; gap: 10px;">
                    <a href="dashboard.html" class="nav-item active" style="color: white; text-decoration: none; padding: 12px; border-radius: 8px; background: #1e293b; display: block;"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
                    
                    <a href="clients.html" id="menu-clients" style="color: #94a3b8; text-decoration: none; padding: 12px; display: block;"><i class="fa-solid fa-users"></i> Gestion Clients</a>
                    <a href="commandes.html" id="menu-commandes" style="color: #94a3b8; text-decoration: none; padding: 12px; display: block;"><i class="fa-solid fa-file-invoice"></i> Commandes</a>
                    <a href="utilisateurs.html" id="menu-users" style="color: #94a3b8; text-decoration: none; padding: 12px; display: block;"><i class="fa-solid fa-user-gear"></i> Utilisateurs</a>
                </nav>
            </div>
            
            <div style="border-top: 1px solid #1e293b; padding-top: 20px;">
                <div style="font-size: 14px; font-weight: 600;" id="user-display-name">Chargement...</div>
                <div style="font-size: 12px; color: #64748b; margin-bottom: 15px;" id="user-display-role">Rôle</div>
                <button onclick="deconnexion()" style="width: 100%; padding: 8px; background: #dc2626; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 600;">
                    <i class="fa-solid fa-power-off"></i> Déconnexion
                </button>
            </div>
        </aside>

        <main style="flex: 1; padding: 40px; background: #f8fafc;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
                <div>
                    <h1 style="font-size: 28px; color: #0f172a;">Suivi de Production</h1>
                    <p style="color: #64748b;">Planification de l'imprimerie en temps réel</p>
                </div>
                <a href="commandes.html" id="btn-nouveau-projet" style="background: #2563eb; color: white; padding: 12px 24px; border-radius: 8px; text-decoration: none; font-weight: 600; display: none;">
                    <i class="fa-solid fa-plus"></i> Saisir Commande
                </a>
            </div>

            <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px;">
                <div style="background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); display: flex; align-items: center; gap: 15px;">
                    <div style="background: #fff7ed; color: #ea580c; padding: 15px; border-radius: 50%; font-size: 20px;"><i class="fa-solid fa-clock"></i></div>
                    <div>
                        <div style="font-size: 14px; color: #64748b;">En Attente</div>
                        <div id="count-attente" style="font-size: 24px; font-weight: 700;">0</div>
                    </div>
                </div>
                <div style="background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); display: flex; align-items: center; gap: 15px;">
                    <div style="background: #eff6ff; color: #2563eb; padding: 15px; border-radius: 50%; font-size: 20px;"><i class="fa-solid fa-spinner"></i></div>
                    <div>
                        <div style="font-size: 14px; color: #64748b;">En Impression</div>
                        <div id="count-cours" style="font-size: 24px; font-weight: 700;">0</div>
                    </div>
                </div>
                <div style="background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); display: flex; align-items: center; gap: 15px;">
                    <div style="background: #f0fdf4; color: #16a34a; padding: 15px; border-radius: 50%; font-size: 20px;"><i class="fa-solid fa-circle-check"></i></div>
                    <div>
                        <div style="font-size: 14px; color: #64748b;">Terminés</div>
                        <div id="count-termine" style="font-size: 24px; font-weight: 700;">0</div>
                    </div>
                </div>
            </div>

            <div style="background: white; padding: 24px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);">
                <table style="width: 100%; border-collapse: collapse; text-align: left;">
                    <thead>
                        <tr style="border-bottom: 2px solid #f1f5f9; color: #64748b; font-size: 13px;">
                            <th style="padding: 12px;">TRAVAIL & CLIENT</th>
                            <th style="padding: 12px;">QUANTITÉ</th>
                            <th style="padding: 12px;">MACHINE</th>
                            <th style="padding: 12px;">PRIORITÉ</th>
                            <th style="padding: 12px;">STATUT</th>
                            <th style="padding: 12px;">LIVRAISON</th>
                            <th style="padding: 12px;">ACTION</th>
                        </tr>
                    </thead>
                    <tbody id="table-body-planification">
                        </tbody>
                </table>
            </div>
        </main>
    </div>

    <script src="js/donnees.js"></script>
    <script src="js/auth.js"></script>
    <script>
        // 1. Protection de la page et récupération des données de l'utilisateur connecté
const utilisateurConnecte = verifierSecuritePage();

// 2. Affichage des infos de profil
document.getElementById("user-display-name").innerText = utilisateurConnecte.nom;
document.getElementById("user-display-role").innerText = utilisateurConnecte.role;

// 3. APPLICATION DES DROITS SELON LE RÔLE
if (utilisateurConnecte.role === "Administrateur") {
    document.getElementById("btn-nouveau-projet").style.display = "inline-block";
} 
else if (utilisateurConnecte.role === "Planificateur") {
    document.getElementById("btn-nouveau-projet").style.display = "inline-block";
    document.getElementById("menu-users").style.display = "none";
} 
else if (utilisateurConnecte.role === "Opérateur") {
    document.getElementById("menu-clients").style.display = "none";
    document.getElementById("menu-commandes").style.display = "none";
    document.getElementById("menu-users").style.display = "none";
    document.getElementById("btn-nouveau-projet").style.display = "none";
}

// 4. CHARGEMENT ET RELATION DES DONNÉES (Jointure locale corrigée)
function afficherPlanification() {
    const planifications = DB.get("planifications");
    const tbody = document.getElementById("table-body-planification");
    
    let attente = 0, cours = 0, termine = 0;
    tbody.innerHTML = "";

    if (planifications.length === 0) {
        tbody.innerHTML = `<tr><td colspan="7" style="text-align:center; padding:20px; color:#64748b;">Aucun travail d'impression planifié.</td></tr>`;
    } else {
        planifications.forEach((p) => {
            // Jointure locale sécurisée grâce à notre objet DB
            const commande = DB.trouverParId("commandes", p.commandeId);
            const client = commande ? DB.trouverParId("clients", commande.clientId) : null;
            
            // Calcul des compteurs selon le statut
            if (p.statut === "En attente") attente++;
            if (p.statut === "En impression") cours++;
            if (p.statut === "Terminé") termine++;

            // Couleurs de badge dynamiques
            let statusColor = p.statut === "Terminé" ? "#16a34a" : (p.statut === "En impression" ? "#2563eb" : "#ea580c");
            let statusBg = p.statut === "Terminé" ? "#f0fdf4" : (p.statut === "En impression" ? "#eff6ff" : "#fff7ed");

            const tr = document.createElement("tr");
            tr.style.borderBottom = "1px solid #f1f5f9";
            tr.innerHTML = `
                <td style="padding: 14px;">
                    <div style="font-weight:600;">${commande ? commande.titre : 'Travail sans titre'}</div>
                    <div style="font-size:12px; color:#64748b;"><i class="fa-solid fa-building"></i> ${client ? client.nom : 'Client inconnu'}</div>
                </td>
                <td style="padding: 14px;">${commande ? commande.quantite : 0} ex</td>
                <td style="padding: 14px;"><i class="fa-solid fa-gears" style="color:#64748b;"></i> ${p.machine}</td>
                <td style="padding: 14px;"><span style="color:${p.priorite === 'Haute' ? '#dc2626':'#64748b'}; font-weight:600;">${p.priorite}</span></td>
                <td style="padding: 14px;"><span style="background:${statusBg}; color:${statusColor}; padding:4px 8px; border-radius:12px; font-size:12px; font-weight:600;">${p.statut}</span></td>
                <td style="padding: 14px;">${p.dateLivraison}</td>
                <td style="padding: 14px;">
                    <!-- Changement de statut sécurisé par ID unique de planification -->
                    <button onclick="changerStatutLocal('${p.id}')" style="background:none; border:none; color:#2563eb; cursor:pointer; font-size:16px;" title="Changer le statut de production">
                        <i class="fa-solid fa-arrow-rotate-right"></i>
                    </button>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    // Mise à jour des compteurs sur les blocs du tableau de bord
    document.getElementById("count-attente").innerText = attente;
    document.getElementById("count-cours").innerText = cours;
    document.getElementById("count-termine").innerText = termine;
}

// Fonction globale corrigée pour faire cycler les statuts au clic
window.changerStatutLocal = function(planifId) {
    let planifications = DB.get("planifications");
    
    // Trouver l'élément exact par son ID unique
    const index = planifications.findIndex(p => p.id === planifId);
    
    if (index !== -1) {
        let s = planifications[index].statut;
        
        // Cycle de vie d'une tâche : En attente -> En impression -> Terminé -> Retour au début
        if (s === "En attente") planifications[index].statut = "En impression";
        else if (s === "En impression") planifications[index].statut = "Terminé";
        else planifications[index].statut = "En attente";
        
        // Sauvegarde immédiate dans le localStorage du navigateur
        DB.save("planifications", planifications);
        
        // Rafraîchissement instantané de la vue
        afficherPlanification();
    }
};

// Lancement automatique au chargement de la page
afficherPlanification();
    </script>
</body>
</html>
